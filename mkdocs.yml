site_name: Digital Reference Material Document (DRMD)
site_description: Best Practice Guidelines for the DRMD XML Schema (ISO 33401:2024)
site_author: BAM — Bundesanstalt für Materialforschung und -prüfung
site_url: https://punitharumilli.github.io/DRMD_Schema/

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: deep orange
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: deep orange
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - content.tabs.link

nav:
  - 1. Home: index.md
  - 2. Overview & Architecture: architecture.md
  - 3. Administrative Data: administrative_data.md
  - 4. Materials: materials.md
  - 5. Properties: properties.md
  - 6. Statements: statements.md
  - 7. Comments & Documents: comments_documents.md
  - 8. Digital Signature: digital_signature.md
  - 9. Interoperability Profiles: interoperability_profiles.md
  - 10. Cross-reference Conventions: cross_references.md
  - 11. Units, Quantities & Uncertainty: units_quantities.md
  - 12. Validation Rules: validation_rules.md
  - 13. Parsing & Data Extraction: parsing_guide.md
  - 14. Security & Trust Model: security_trust.md
  - 15. Versioning: versioning.md
  - 16. Implementation Checklists: checklists.md
  - 17. Schema Interactive Tree: schema_tree.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.inlinehilite
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.mark
  - pymdownx.critic
  - pymdownx.keys
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
