<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DRMD Interactive Schema Viewer</title>
    <style>
        :root {
            --md-primary-fg-color: #4051b5;
            --md-typeset-color: #333333;
            --md-default-bg-color: #ffffff;
            --border-color: #e0e0e0;
            --hover-bg: #f5f5f5;
            --selected-bg: #e8eaf6;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            height: 100vh;
            color: var(--md-typeset-color);
            background: var(--md-default-bg-color);
            overflow: hidden;
        }
        #sidebar {
            width: 35%;
            border-right: 1px solid var(--border-color);
            overflow-y: auto;
            padding: 10px;
            background: #fafafa;
        }
        #content {
            width: 65%;
            padding: 30px;
            overflow-y: auto;
        }
        .tree-node {
            margin-left: 20px;
        }
        .tree-item {
            cursor: pointer;
            padding: 6px 10px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            font-size: 14px;
        }
        .tree-item:hover {
            background-color: var(--hover-bg);
        }
        .tree-item.selected {
            background-color: var(--selected-bg);
            font-weight: 600;
            color: var(--md-primary-fg-color);
        }
        .toggle {
            width: 16px;
            height: 16px;
            display: inline-block;
            margin-right: 6px;
            text-align: center;
            line-height: 16px;
            font-weight: bold;
            color: #666;
            cursor: pointer;
            user-select: none;
        }
        .toggle:hover { color: var(--md-primary-fg-color); }
        .node-icon {
            color: #00bcd4;
            margin-right: 6px;
            font-weight: bold;
        }
        .children {
            display: none;
        }
        .children.open {
            display: block;
        }
        
        /* Content Panel Styles */
        h1 { margin-top: 0; color: var(--md-primary-fg-color); border-bottom: 2px solid var(--md-primary-fg-color); padding-bottom: 10px; }
        .badge { display: inline-block; padding: 3px 8px; border-radius: 12px; font-size: 12px; font-weight: bold; margin-right: 10px; background: #eee;}
        .badge.type { background: #e3f2fd; color: #1565c0; }
        .badge.cardinality { background: #fbe9e7; color: #d84315; }
        
        .section { margin-top: 25px; }
        .section h3 { margin-bottom: 10px; color: #555; border-bottom: 1px solid #eee; padding-bottom: 5px; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid var(--border-color); padding: 8px 12px; text-align: left; font-size: 14px;}
        th { background: #f5f5f5; }
        
        .rule-card {
            background: #fff3e0;
            border-left: 4px solid #ff9800;
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 0 4px 4px 0;
            font-size: 14px;
        }
        .rule-card.error { background: #ffebee; border-left-color: #f44336; }
        .rule-id { font-weight: bold; margin-right: 8px; }
    </style>
</head>
<body>

    <div id="sidebar">
        <div style="padding: 10px; color: #888; text-align: center;">Loading Schema...</div>
    </div>
    
    <div id="content">
        <h2 style="color: #aaa; margin-top: 50px; text-align: center;">Select an element from the tree to view its details.</h2>
    </div>

    <script>
        let schemaData = null;

        // Fetch the JSON generated by our python script
        fetch('assets/data/schema_data.json')
            .then(res => res.json())
            .then(data => {
                schemaData = data;
                renderTree();
            })
            .catch(err => {
                document.getElementById('sidebar').innerHTML = '<div style="color:red; padding: 20px;">Failed to load schema data. ' + err + '</div>';
            });

        function renderTree() {
            const sidebar = document.getElementById('sidebar');
            sidebar.innerHTML = '';
            sidebar.appendChild(createNodeElement(schemaData, true));
        }

        function createNodeElement(node, isOpen = false) {
            const container = document.createElement('div');
            container.className = 'tree-node';

            const item = document.createElement('div');
            item.className = 'tree-item';
            
            // Toggle button
            const hasChildren = node.children && node.children.length > 0;
            const toggle = document.createElement('span');
            toggle.className = 'toggle';
            if(node.recursive) {
                 toggle.innerHTML = '&#8634;';
                 toggle.style.color = '#ff9800';
            } else if (hasChildren) {
                toggle.innerHTML = isOpen ? '&#9662;' : '&#9656;';
                toggle.onclick = (e) => {
                    e.stopPropagation();
                    const childrenDiv = container.querySelector('.children');
                    if (childrenDiv.classList.contains('open')) {
                        childrenDiv.classList.remove('open');
                        toggle.innerHTML = '&#9656;';
                    } else {
                        childrenDiv.classList.add('open');
                        toggle.innerHTML = '&#9662;';
                    }
                };
            } else {
                toggle.innerHTML = '&bull;';
            }
            item.appendChild(toggle);

            // Icon and Name
            const icon = document.createElement('span');
            icon.className = 'node-icon';
            icon.innerHTML = '&lt;/&gt;';
            item.appendChild(icon);

            const name = document.createElement('span');
            name.textContent = node.name;
            item.appendChild(name);

            // Click to view details
            item.onclick = () => {
                document.querySelectorAll('.tree-item').forEach(el => el.classList.remove('selected'));
                item.classList.add('selected');
                showDetails(node);
            };

            container.appendChild(item);

            // Children container
            if (hasChildren && !node.recursive) {
                const childrenDiv = document.createElement('div');
                childrenDiv.className = isOpen ? 'children open' : 'children';
                node.children.forEach(child => {
                    childrenDiv.appendChild(createNodeElement(child));
                });
                container.appendChild(childrenDiv);
            }

            return container;
        }

        function showDetails(node) {
            const content = document.getElementById('content');
            let html = `<h1>${node.name}</h1>`;
            
            html += `<div style="margin-bottom: 20px;">
                <span class="badge type">Type: ${node.type}</span>
                <span class="badge cardinality">Cardinality: ${node.cardinality || '[1..1]'}</span>
            </div>`;

            if (node.description) {
                html += `<div style="font-size: 16px; line-height: 1.6; color: #444;">${node.description}</div>`;
            } else {
                html += `<div style="font-size: 16px; line-height: 1.6; color: #888;"><i>No description available.</i></div>`;
            }

            // Attributes
            if (node.attributes && node.attributes.length > 0) {
                html += `<div class="section">
                    <h3>Attributes</h3>
                    <table>
                        <thead>
                            <tr><th>Name</th><th>Type</th><th>Use</th><th>Description</th></tr>
                        </thead>
                        <tbody>`;
                node.attributes.forEach(attr => {
                    html += `<tr>
                        <td><strong>@${attr.name}</strong></td>
                        <td><code>${attr.type}</code></td>
                        <td>${attr.use}</td>
                        <td>${attr.description || ''}</td>
                    </tr>`;
                });
                html += `</tbody></table></div>`;
            }

            // Schematron Rules
            if (node.rules && node.rules.length > 0) {
                html += `<div class="section">
                    <h3>Business Rules (Schematron)</h3>`;
                node.rules.forEach(rule => {
                    const cardClass = rule.role === 'error' || rule.role === 'conditional-error' ? 'error' : '';
                    html += `<div class="rule-card ${cardClass}">
                        <div><span class="rule-id">[${rule.id}]</span> <span style="text-transform:uppercase; font-size:12px; color:#888;">${rule.role}</span></div>
                        <div style="margin-top: 5px;">${rule.description}</div>
                        <div style="margin-top: 5px; font-family: monospace; font-size: 12px; color: #666; background: rgba(0,0,0,0.05); padding: 4px;">XPath: ${rule.test}</div>
                    </div>`;
                });
                html += `</div>`;
            }

            content.innerHTML = html;
        }
    </script>
</body>
</html>
